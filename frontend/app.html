<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumenBlader — 工作台</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    <span>LumenBlader</span>
  </a>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="accounts">博主管理</button>
    <button class="nav-tab" data-page="downloads">下载中心</button>
    <button class="nav-tab" data-page="analysis">分析工作台</button>
  </div>
  <div class="nav-actions">
    <button class="nav-settings" id="settings-btn" title="设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
</nav>

<!-- COOKIE WARNING BANNER -->
<div class="cookie-banner" id="cookie-banner" style="display:none">
  <div class="cookie-banner-inner">
    <svg class="cookie-banner-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span class="cookie-banner-text" id="cookie-banner-text">抖音 Cookie 已失效，下载功能可能无法正常使用</span>
    <button class="cookie-banner-action" onclick="document.getElementById('settings-btn').click()">去设置</button>
    <button class="cookie-banner-close" onclick="dismissCookieBanner()" title="关闭">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div id="page-accounts" class="page active">
    <!-- Populated by accounts.js -->
  </div>
  <div id="page-downloads" class="page">
    <!-- Populated by downloads.js -->
  </div>
  <div id="page-analysis" class="page page-analysis">
    <!-- Populated by analysis.js -->
  </div>
</main>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">设置</h2>
      <button class="modal-close" id="settings-close">&times;</button>
    </div>
    <div class="modal-body" id="settings-form"></div>
  </div>
</div>

<!-- ADD ACCOUNT MODAL -->
<div class="modal-overlay" id="add-account-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">添加博主</h2>
      <button class="modal-close" onclick="closeAddAccount()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">博主主页 URL</label>
        <input type="text" class="input" id="add-account-url" placeholder="粘贴抖音或 TikTok 主页链接…">
        <p class="form-hint">支持 douyin.com 和 tiktok.com，自动识别平台</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddAccount()">取消</button>
      <button class="btn btn-primary" onclick="submitAddAccount()">添加</button>
    </div>
  </div>
</div>

<!-- BATCH DOWNLOAD MODAL -->
<div class="modal-overlay" id="batch-download-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">批量下载</h2>
      <button class="modal-close" onclick="closeBatchDownload()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">起始日期（留空不限）</label>
          <input type="date" class="input" id="batch-earliest">
        </div>
        <div class="form-group">
          <label class="form-label">结束日期（留空不限）</label>
          <input type="date" class="input" id="batch-latest">
        </div>
      </div>
      <p class="form-hint">留空则下载全部视频</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeBatchDownload()">取消</button>
      <button class="btn btn-primary" id="batch-submit-btn" onclick="submitBatchDownload()">开始下载</button>
    </div>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="task-detail-overlay">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h2 class="modal-title">任务详情</h2>
      <button class="modal-close" onclick="closeTaskDetail()">&times;</button>
    </div>
    <div class="modal-body" id="task-detail-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- SCRIPTS -->
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/accounts.js"></script>
<script src="/static/js/downloads.js"></script>
<script src="/static/js/analysis.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/marked.min.js"></script>

</body>
</html>
